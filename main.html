<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="StyleSheet" href="styling.css">
</head>
<body>
    <header>
    <h1 class="heading"> STUDENT REGISTRATION FORM</h1>
    </header>
    <form action="/Registration-form" method="post" enctype="multipart/form-data">
        <fieldset>
            <div class="name">
                <label>Name:</label><br>
                <input type="text" name="Name" placeholder="write your full name" required autofocus><br>
            
                <label for="fathername">FatherName: </label><br>
                <input type="text" id="fathername" name="fathername" placeholder="write your father name" required ><br>
            
                <label>Email: </label><br>
                <input type="email" name="Email"><br>
            
                <label >Password: </label><br>
                <input type="password" name="password" minlength="8" title="password must be of minimum 8 character" required><br>
            
                <label for="gender">Gender: </label><br>
                <input type="radio" name="Gender" value="Male" checked="">male
                <input type="radio" name="Gender" value="female">Female<br><br>
            
                <label for="department">Department: </label><br>
                <select name="Department">
                    <option value="CS">Computer Science</option>
                    <option value="AI">Artifical Intelligence</option>
                    <option value="SE" selected="">SoftwareEngineering</option>
                    <option value="Robotics">Robotics</option>
                </select><br><br>
            
                <label for="skills">Skills: </label><br>
                    <input type="checkbox" name="skills" value="Cricket">Cricket<br>
                    <input type="checkbox" name="skills" value="football">football<br>
                    <input type="checkbox" name="skills" value="BacketBall">BasketBall<br>
                    <input type="checkbox" name="skills" value="table tennis">Table tennis<br>
                    <input type="checkbox" name="skills" value="Badminton">Badminton<br><br>
                
                <label for="DOB">Date of Birth: </label><br>
                <input type="date" name="DOB"><br>
            
                <label for="image">Image: </label><br>
                <input type="file" id="image" name="Image"><br>
            
                <label for="address">Address: </label><br>
                <textarea id="address" name="Address"></textarea><br><br>
            
                <button class="button" type="submit" id="submit" name="Registered">Submit</button>
                <button class="button" type="reset" name="Reset">Reset</button>
        </fieldset>
    </form>
</body>
</html>
